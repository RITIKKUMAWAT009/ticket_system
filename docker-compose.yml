version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticket_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ticket_db?schema=public
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-32chars
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      OTP_EXPIRY_MINUTES: 5
      FCM_DISABLED: 'true'
      CORS_ORIGIN: http://localhost:8080,http://localhost:3000
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
